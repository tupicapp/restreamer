version: 1

runtime:
  timezone: Asia/Tehran
  reload:
    debounce_ms: 250
    atomic_swap: true
    keep_last_good: true
    require_output_continuity: true

defaults:
  video:
    width: 1280
    height: 720
    fps: 30
    format: RGBA
  audio:
    sample_rate: 48000
    channels: 2
    layout: stereo

sources:
  - id: cam_a
    uri: rtmp://localhost/live/cam_a
    kind: av
    reconnect:
      enabled: true
      backoff_ms: 500
      max_backoff_ms: 5000
    buffering:
      latency_ms: 200

  - id: cam_b
    uri: rtmp://localhost/live/cam_b
    kind: av
    reconnect:
      enabled: true
      backoff_ms: 500
      max_backoff_ms: 5000
    buffering:
      latency_ms: 200

nodes:
  - id: main_switch
    type: switch
    mode: scene
    inputs:
      - cam_a_full
      - split_view
      - side_by_side
    default_input: cam_a_full

scenes:
  - id: cam_a_full
    kind: compose
    canvas:
      width: 1280
      height: 720
      fps: 30
    stale_policy:
      video: hold_last_frame
      audio: silence
      timeout_ms: 800
    layers:
      - source: cam_a
        x: 0
        y: 0
        width: 1280
        height: 720
        z: 0
        audio:
          mode: direct

  - id: split_view
    kind: compose
    canvas:
      width: 1280
      height: 720
      fps: 30
    stale_policy:
      video: hold_last_frame
      audio: silence
      timeout_ms: 800
    layers:
      - source: cam_a
        x: 0
        y: 0
        width: 640
        height: 720
        z: 0
        audio:
          mode: mute
      - source: cam_b
        x: 640
        y: 0
        width: 640
        height: 720
        z: 0
        audio:
          mode: direct

  - id: side_by_side
    kind: compose
    canvas:
      width: 1280
      height: 720
      fps: 30
    stale_policy:
      video: hold_last_frame
      audio: silence
      timeout_ms: 800
    layers:
      - source: cam_a
        x: 0
        y: 0
        width: 640
        height: 720
        z: 0
        audio:
          mode: direct
      - source: cam_b
        x: 640
        y: 0
        width: 640
        height: 720
        z: 1
        audio:
          mode: mute

programs:
  - id: morning_show
    root: main_switch
    schedule:
      timezone: Asia/Tehran
      entries:
        - at: "09:00:00"
          select: cam_a_full
          transition:
            type: cut
            duration_ms: 0
        - at: "09:15:00"
          select: split_view
          transition:
            type: cut
            duration_ms: 0
        - at: "09:30:00"
          select: cam_a_full
          transition:
            type: cut
            duration_ms: 0

outputs:
  - id: live_main
    program: morning_show
    encoding:
      preset: balanced
    continuity:
      keep_running_on_reload_error: true
    sinks:
      - id: live_rtmp
        type: rtmp
        uri: rtmp://localhost/live/out
      - id: archive_mp4
        type: file
        path: ./out/morning_show.mp4
