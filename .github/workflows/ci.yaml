name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      rtmp:
        image: bluenviron/mediamtx:1
        ports:
          - 1938:1935
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Start local streaming fixtures
        run: make -f MakeFile streaming-infra-up

      - name: Wait for streaming fixtures
        run: make -f MakeFile streaming-infra-ready

      - name: Run aggregated integration suite
        run: make -f MakeFile irajstreamer-all-tests
